name: Setup build environment
description: >-
  Shared setup for the release build jobs: pnpm, Node, the Rust toolchain
  (+ cache) and frontend dependencies. The repository must already be checked
  out (a local composite action is only resolvable after checkout).

inputs:
  rust-targets:
    description: Comma-separated Rust target triples to install (empty = host only).
    required: false
    default: ''
  cache-key:
    description: Extra key segmenting the Rust build cache (e.g. the platform name).
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        # Must match the locally used pnpm major. pnpm 9 broke in CI with
        # "packages field missing or empty" (pnpm-workspace.yaml uses `allowBuilds`,
        # unknown to pnpm 9) → the setup-node pnpm cache failed. 11 = local version.
        version: 11

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        # pnpm 11 requires Node >= 22.13. 22 matches the local environment.
        node-version: 22
        cache: pnpm

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-targets }}

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri -> target
        key: ${{ inputs.cache-key }}

    - name: Install frontend dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
