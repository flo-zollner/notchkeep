name: Static
# Reusable: invoked by ci.yml. Concurrency is handled by the caller.
on:
  workflow_call:
permissions: { contents: read }
jobs:
  rust-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
  frontend-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup build environment
        uses: ./.github/actions/setup
        with:
          install-rust: 'false'
      - run: pnpm lint
      - run: pnpm check
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: PII scan
        run: bash scripts/scan-pii.sh tree
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - name: Setup build environment
        uses: ./.github/actions/setup
        with:
          cache-key: build-smoke
      - run: pnpm build
      - run: cargo build --manifest-path src-tauri/Cargo.toml --release
