name: Security
# Reusable: invoked by ci.yml on push/PR. Also runs nightly on its own schedule.
on:
  workflow_call:
  schedule: [{ cron: '17 4 * * *' }]
permissions: { contents: read, security-events: write }
jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with: { manifest-path: src-tauri/Cargo.toml }
  osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=src-tauri/Cargo.lock
            --lockfile=pnpm-lock.yaml
            --format=sarif
            --output=osv.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with: { sarif_file: osv.sarif, category: osv }
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install semgrep
      - run: semgrep --config ./.semgrep --sarif --output semgrep.sarif --error || true
      - uses: github/codeql-action/upload-sarif@v4
        with: { sarif_file: semgrep.sarif, category: semgrep }
      - name: Gate on error-level semgrep findings
        run: node scripts/ci-report.mjs
  codeql:
    runs-on: ubuntu-latest
    permissions: { security-events: write, contents: read }
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with: { languages: javascript-typescript }
      - uses: github/codeql-action/analyze@v4
