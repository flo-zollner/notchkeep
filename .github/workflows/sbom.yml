name: SBOM
on:
  push: { branches: [main] }
  release: { types: [published] }
permissions: { contents: read }
jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-cyclonedx --locked
      - run: cargo cyclonedx --manifest-path src-tauri/Cargo.toml -f json
      - uses: pnpm/action-setup@v5
        with: { version: 11 }
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # cyclonedx-npm runs `npm ls`, which errors on a pnpm-managed node_modules
      # tree. --ignore-npm-errors lets it emit a best-effort SBOM from what it can
      # resolve instead of failing the job.
      - run: npx -y @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom-npm.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            **/*.cdx.json
            sbom-npm.json
