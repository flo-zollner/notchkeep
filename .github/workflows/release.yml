name: Release

# Baut signierte Release-Bundles für Linux, Windows und macOS (Apple Silicon)
# und hängt sie an ein GitHub-Release. Ausgelöst durch einen Tag-Push `v*`
# (z. B. `git push origin v0.3.0`). Das Release wird als DRAFT erstellt —
# Notes/Assets prüfen, dann in der GitHub-UI auf "Publish" klicken.

on:
  push:
    tags:
      - 'v*'

# tauri-action braucht Schreibrechte, um das Release anzulegen.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — nur Apple Silicon (aarch64). macos-14-Runner sind arm64.
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          # Linux — AppImage, .deb, .rpm. ubuntu-22.04 wegen webkit2gtk-4.1.
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          # Windows — .msi (WiX) und .exe (NSIS).
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux-Systembibliotheken für Tauri 2 (WebKitGTK 4.1, AppIndicator,
      # rsvg, patchelf für AppImage).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Muss zur lokal genutzten pnpm-Major passen. pnpm 9 brach im CI mit
          # "packages field missing or empty" ab (pnpm-workspace.yaml nutzt
          # `allowBuilds`, das pnpm 9 nicht kennt) → setup-node pnpm-Cache
          # schlug fehl. 11 = lokale Version.
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11 verlangt Node >= 22.13. 22 entspricht der lokalen Umgebung.
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Cargo-Build-Cache, key u. a. nach Plattform getrennt.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Falls du später Tauri-Updater-Signierung aktivierst, hier die
          # Secrets ergänzen:
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Tag/Name/Body aus dem gepushten Tag ableiten. tauri-action sammelt
          # die Bundles aller Matrix-Jobs in EIN Release (gleicher tagName).
          tagName: ${{ github.ref_name }}
          releaseName: 'Notchkeep ${{ github.ref_name }}'
          releaseBody: 'Automatisch gebaute Bundles. Siehe RELEASE_NOTES.md im Tag.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
