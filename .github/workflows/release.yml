name: Release

# Baut signierte Release-Bundles für Linux, Windows und macOS (Apple Silicon)
# und hängt sie an ein GitHub-Release. Ausgelöst durch einen Tag-Push `v*`
# (z. B. `git push origin v0.3.0`). Das Release wird als DRAFT erstellt —
# Notes/Assets prüfen, dann in der GitHub-UI auf "Publish" klicken.

on:
  push:
    tags:
      - 'v*'

# tauri-action braucht Schreibrechte, um das Release anzulegen.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — nur Apple Silicon (aarch64). macos-14-Runner sind arm64.
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          # Linux — AppImage, .deb, .rpm. ubuntu-22.04 wegen webkit2gtk-4.1.
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          # Windows — .msi (WiX) und .exe (NSIS).
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Linux-Systembibliotheken für Tauri 2 (WebKitGTK 4.1, AppIndicator,
      # rsvg, patchelf für AppImage).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          # Muss zur lokal genutzten pnpm-Major passen. pnpm 9 brach im CI mit
          # "packages field missing or empty" ab (pnpm-workspace.yaml nutzt
          # `allowBuilds`, das pnpm 9 nicht kennt) → setup-node pnpm-Cache
          # schlug fehl. 11 = lokale Version.
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # pnpm 11 verlangt Node >= 22.13. 22 entspricht der lokalen Umgebung.
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Cargo-Build-Cache, key u. a. nach Plattform getrennt.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Stellt sicher, dass die eingecheckte static/licenses.html aktuell ist
      # (GPL-3.0-Compliance). Generiert die Liste neu und bricht ab, wenn sie
      # vom Commit abweicht — dann muss `pnpm gen:licenses` lokal gelaufen und
      # committet werden. Nur auf Linux, da plattformunabhängig.
      - name: Verify third-party licenses up to date
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # cargo-about braucht ab 0.9 das `cli`-Feature für das Binary. Version
          # gepinnt = identische Ausgabe wie lokal, sonst triggert der Drift-
          # Check schon bei Tool-Versionsunterschieden statt bei echtem Drift.
          cargo install cargo-about --version 0.9.0 --locked --features cli
          pnpm gen:licenses
          git diff --exit-code -- static/licenses.html

      # RELEASE_NOTES.md (aus dem getaggten Commit) als Release-Body übernehmen.
      # tauri-action kennt nur den String-Input `releaseBody`, keinen Pfad —
      # daher die Datei hier in ein (mehrzeiliges) Step-Output lesen. `shell:
      # bash` ist auf allen Runnern (auch Windows) verfügbar, damit das
      # Heredoc-Format für GITHUB_OUTPUT überall gleich funktioniert. Fehlt die
      # Datei, bleibt der Body leer (tauri-action ergänzt die Asset-Liste).
      - name: Read release notes
        id: notes
        shell: bash
        run: |
          {
            echo 'body<<RELEASE_NOTES_EOF'
            cat RELEASE_NOTES.md 2>/dev/null || true
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Tag/Name/Body aus dem gepushten Tag ableiten. tauri-action sammelt
          # die Bundles aller Matrix-Jobs in EIN Release (gleicher tagName).
          tagName: ${{ github.ref_name }}
          releaseName: 'Notchkeep ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Baut, signiert und veröffentlicht das Android-APK. Läuft nach den
  # Desktop-Jobs, damit das Release-Draft bereits existiert und `gh release
  # upload` die Assets anhängen kann.
  android:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Setup Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      # Rust-Build-Cache für Android-Cross-Compile-Targets.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: android

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Keystore aus Secret decodieren; landet nur im Runner-Temp, nie im Repo.
      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      # keystore.properties wird von src-tauri/gen/android/app/build.gradle.kts
      # über rootProject.file("keystore.properties") eingelesen (= src-tauri/gen/android/).
      - name: Write keystore.properties
        run: |
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed APK
        run: pnpm tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}

      # Sucht das erste release-APK und benennt es mit der Tag-Version um.
      - name: Locate APK
        id: apk
        run: |
          APK=$(find src-tauri/gen/android -path '*release*.apk' | head -1)
          test -n "$APK" || { echo "no APK found"; exit 1; }
          NAME="Notchkeep_${GITHUB_REF_NAME#v}.apk"
          cp "$APK" "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # tauri signer sign schreibt die Signatur nach <file>.sig (minisign-Format).
      # Derselbe minisign-Schlüssel wie für die Desktop-Updater-Signaturen wird
      # wiederverwendet — kein separates Android-Keypair nötig.
      - name: Sign APK and build manifest
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PUB_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          pnpm tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "${{ steps.apk.outputs.name }}"
          VER="${GITHUB_REF_NAME#v}"
          URL="https://github.com/flo-zollner/notchkeep/releases/download/${GITHUB_REF_NAME}/${{ steps.apk.outputs.name }}"
          node scripts/gen-android-manifest.mjs \
            "${{ steps.apk.outputs.name }}" \
            "$VER" \
            "0" \
            "$URL" \
            "${{ steps.apk.outputs.name }}.sig" \
            android-latest.json

      # APK und Manifest an das bereits vorhandene Draft-Release anhängen
      # (--clobber überschreibt beim Re-Run eines Jobs).
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ steps.apk.outputs.name }}" android-latest.json --clobber
