name: Release

# Baut signierte Release-Bundles für Linux, Windows und macOS (Apple Silicon)
# und hängt sie an ein GitHub-Release. Ausgelöst durch einen Tag-Push `v*`
# (z. B. `git push origin v0.3.0`). Das Release wird als DRAFT erstellt —
# Notes/Assets prüfen, dann in der GitHub-UI auf "Publish" klicken.

on:
  push:
    tags:
      - 'v*'

# tauri-action braucht Schreibrechte, um das Release anzulegen.
permissions:
  contents: write

jobs:
  # Gate: nicht erneut testen — die CI (ci.yml) lief bereits beim Push des
  # getaggten Commits auf main (static → test → security → pentest). Wir warten,
  # bis dieser CI-Run für GENAU diesen Commit erfolgreich abgeschlossen ist, und
  # bauen erst dann. Das vermeidet den doppelten Lauf der Test-Suite pro Release.
  # Existiert kein grüner CI-Run für den Commit (ungetaggter/ungetesteter Stand),
  # bricht der Release ab.
  await-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Require a successful CI run on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          SHA="${GITHUB_SHA}"
          echo "Waiting for ci.yml to conclude on ${SHA} …"
          deadline=$(( SECONDS + 2400 ))   # up to 40 min
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            out="$(gh api \
              "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=1" \
              --jq '.workflow_runs[0] | "\(.status // "none") \(.conclusion // "none")"' \
              2>/dev/null || echo "none none")"
            status="${out%% *}"
            conclusion="${out##* }"
            echo "ci.yml: status=${status} conclusion=${conclusion}"
            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                echo "CI passed on ${SHA} — proceeding to release."
                exit 0
              fi
              echo "::error::CI concluded '${conclusion}' on ${SHA} — refusing to release."
              exit 1
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for CI on ${SHA}."
          exit 1

  # Legt das Draft-Release EINMAL an (nachdem CI grün ist), bevor die vier
  # Build-Jobs parallel ihre Artefakte hochladen. Vermeidet das Race, das
  # entstünde, wenn jeder Build das Release selbst anlegen wollte.
  create-release:
    needs: [await-ci]
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v5
      - name: Create draft release (idempotent)
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Release candidates (vX.Y.Z-rc.N, also -beta/-alpha) are published as
          # PRERELEASE. The updater endpoint resolves .../releases/latest/..., and
          # GitHub's "latest" excludes prereleases — so RCs are never offered as an
          # update to stable users. Stable tags (no suffix) stay a normal draft.
          FLAGS="--draft"
          case "$TAG" in *-rc*|*-beta*|*-alpha*) FLAGS="$FLAGS --prerelease" ;; esac
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" $FLAGS \
              --title "Notchkeep $TAG" \
              --notes-file RELEASE_NOTES.md
          fi
          ID=$(gh release view "$TAG" --json databaseId -q .databaseId)
          echo "release_id=$ID" >> "$GITHUB_OUTPUT"

  build:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — nur Apple Silicon (aarch64). macos-14-Runner sind arm64.
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          # Linux — AppImage, .deb, .rpm. ubuntu-22.04 wegen webkit2gtk-4.1.
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          # Windows — nur .exe (NSIS); .msi entfällt (siehe bundle.targets).
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Linux-Systembibliotheken für Tauri 2 (WebKitGTK 4.1, AppIndicator,
      # rsvg, patchelf für AppImage).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            wget

      # Shared setup (pnpm, Node, Rust toolchain + cache, frontend deps).
      # Cache-Key nach Plattform getrennt.
      - name: Setup build environment
        uses: ./.github/actions/setup
        with:
          rust-targets: ${{ matrix.rust_targets }}
          cache-key: ${{ matrix.platform }}

      # Lizenz-Drift wird bereits im test-Gate geprüft — hier nicht erneut nötig.
      # Build lädt seine Bundles in das von create-release angelegte Draft-
      # Release (releaseId), legt also selbst keins an → konfliktfreie Parallelität.
      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # Baut, signiert und veröffentlicht das Android-APK — PARALLEL zu den
  # Desktop-Builds. Hängt nur an create-release (Draft existiert dann), nicht
  # an build, damit alle vier Builds gleichzeitig laufen.
  android:
    needs: [create-release]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Shared setup (pnpm, Node, Rust toolchain + cache, frontend deps).
      # Android-Cross-Compile-Targets + eigener Cache-Key.
      - name: Setup build environment
        uses: ./.github/actions/setup
        with:
          rust-targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          cache-key: android

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"

      # Keystore aus Secret decodieren; landet nur im Runner-Temp, nie im Repo.
      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      # keystore.properties wird von src-tauri/gen/android/app/build.gradle.kts
      # über rootProject.file("keystore.properties") eingelesen (= src-tauri/gen/android/).
      - name: Write keystore.properties
        run: |
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed APK
        run: pnpm tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}

      # Sucht das erste release-APK und benennt es mit der Tag-Version um.
      - name: Locate APK
        id: apk
        run: |
          APK=$(find src-tauri/gen/android -path '*release*.apk' | head -1)
          test -n "$APK" || { echo "no APK found"; exit 1; }
          NAME="Notchkeep_${GITHUB_REF_NAME#v}.apk"
          cp "$APK" "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # tauri signer sign schreibt die Signatur nach <file>.sig (minisign-Format).
      # Derselbe minisign-Schlüssel wie für die Desktop-Updater-Signaturen wird
      # wiederverwendet — kein separates Android-Keypair nötig.
      - name: Sign APK and build manifest
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PUB_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          pnpm tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "${{ steps.apk.outputs.name }}"
          VER="${GITHUB_REF_NAME#v}"
          URL="https://github.com/flo-zollner/notchkeep/releases/download/${GITHUB_REF_NAME}/${{ steps.apk.outputs.name }}"
          # versionCode aus der von `tauri android build` (re)generierten
          # tauri.properties lesen — das ist der echte Wert, mit dem die APK
          # signiert wurde (Tauri-Formel major*1e6+minor*1e3+patch). So matcht
          # das Manifest garantiert die APK, statt eine Formel nachzubauen.
          VCODE=$(grep -oP 'tauri\.android\.versionCode=\K[0-9]+' src-tauri/gen/android/app/tauri.properties)
          VCODE=${VCODE:-0}
          node scripts/gen-android-manifest.mjs \
            "${{ steps.apk.outputs.name }}" \
            "$VER" \
            "$VCODE" \
            "$URL" \
            "${{ steps.apk.outputs.name }}.sig" \
            android-latest.json

      # APK und Manifest an das bereits vorhandene Draft-Release anhängen
      # (--clobber überschreibt beim Re-Run eines Jobs).
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ steps.apk.outputs.name }}" android-latest.json --clobber

  # Spiegelt das finalisierte latest.json + android-latest.json des Versions-
  # Releases auf ein festes "rolling" Release `updater-latest`. Dessen Assets
  # sind die Updater-Endpoints für ALLE Clients (stable wie beta). Der Channel
  # wird client-seitig gefiltert: stable verwirft Prereleases. Da Tags in
  # Versionsreihenfolge gepusht werden, hält `updater-latest` stets den
  # neuesten Build inkl. RC.
  rolling-manifest:
    needs: [build, android]
    runs-on: ubuntu-latest
    steps:
      - name: Mirror manifests to the rolling updater-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ROLLING="updater-latest"

          # Manifeste des Versions-Releases holen (latest.json wird von
          # tauri-action erzeugt, android-latest.json vom android-Job).
          tmp="$(mktemp -d)"
          gh release download "$TAG" -p 'latest.json' -p 'android-latest.json' -D "$tmp" --clobber

          # tauri-action schreibt die Desktop-Asset-URLs als
          # `…/releases/latest/download/…`. Das funktioniert nur für den
          # STABLE-Kanal (dort IST das getaggte Release das "latest"). Für den
          # Beta-Kanal löst `/releases/latest/` aber auf das neueste STABLE auf —
          # die Prerelease-Dateien liegen dort nicht → 404 beim Download. Daher
          # die URLs auf den versionsspezifischen Pfad dieses Tags umschreiben.
          # (android-latest.json nutzt bereits `/releases/download/<tag>/` und
          # enthält das Muster nicht, bleibt also unberührt.)
          if [ -f "$tmp/latest.json" ]; then
            sed -i "s#releases/latest/download/#releases/download/${TAG}/#g" "$tmp/latest.json"
          fi

          # Rolling-Release idempotent anlegen (Prerelease → nicht "Latest" auf
          # der Releases-Seite). Es trägt nur die zwei Manifest-JSONs.
          if ! gh release view "$ROLLING" >/dev/null 2>&1; then
            gh release create "$ROLLING" \
              --prerelease \
              --title "Updater channel manifests (rolling)" \
              --notes "Auto-maintained. Holds the newest latest.json / android-latest.json (incl. prereleases) used by the in-app updater endpoints. Do not delete."
          fi

          # Manifeste hochladen/überschreiben.
          uploads=()
          [ -f "$tmp/latest.json" ] && uploads+=("$tmp/latest.json")
          [ -f "$tmp/android-latest.json" ] && uploads+=("$tmp/android-latest.json")
          test "${#uploads[@]}" -gt 0 || { echo "no manifests to mirror"; exit 1; }
          gh release upload "$ROLLING" "${uploads[@]}" --clobber

  # Entfernt die standalone .sig-Assets, die tauri-action desktop-seitig hochlädt.
  # Der Updater liest die Signatur INLINE aus latest.json / android-latest.json
  # (Feld "signature") — eine separate .sig wird weder zum Updaten noch zum
  # Installieren geladen. Läuft nach allen Uploads (build + android).
  prune-sigs:
    needs: [build, android]
    runs-on: ubuntu-latest
    steps:
      - name: Remove unneeded .sig assets (signatures are inline in the manifests)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no checkout, so gh cannot infer the repo from .git.
          # Without GH_REPO, `gh release view` fails ("not a git repository") and
          # the prune silently does nothing. Tell gh the repo explicitly.
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # No `|| true` on the gh call itself — if listing assets fails, the job
          # must fail (not silently skip). `|| true` is only for grep, which exits
          # 1 when no asset matches.
          assets="$(gh release view "$TAG" --json assets -q '.assets[].name')"
          mapfile -t sigs < <(printf '%s\n' "$assets" | grep '\.sig$' || true)
          echo "found ${#sigs[@]} .sig asset(s) to prune"
          for a in "${sigs[@]}"; do
            [ -n "$a" ] || continue
            echo "deleting unneeded asset: $a"
            gh release delete-asset "$TAG" "$a" -y
          done
