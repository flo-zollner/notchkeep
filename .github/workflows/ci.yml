name: CI

# Single push/PR pipeline. Stages run in sequence and fail fast — a red stage
# stops the ones after it, so cheap checks gate the expensive ones and no runner
# minutes are spent once something is already broken:
#
#   static  → test  → security  → pentest
#
# Each stage is a reusable workflow. security.yml / pentest.yml also run on their
# own nightly schedule. Run every gate locally before pushing with: pnpm verify
on:
  pull_request:
  push: { branches: [main] }
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  static:
    uses: ./.github/workflows/static.yml

  test:
    needs: [static]
    uses: ./.github/workflows/test.yml

  security:
    needs: [test]
    uses: ./.github/workflows/security.yml

  pentest:
    needs: [security]
    uses: ./.github/workflows/pentest.yml
